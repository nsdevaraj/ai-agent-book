name: Build latest book artifacts

# Rebuilds the PDF and EPUB editions whenever the book sources change and
# uploads them to the rolling "latest" pre-release (assets are overwritten in
# place, so the download URLs stay stable). Versioned releases (v1.2, ...) are
# still cut manually at milestones.

on:
  push:
    branches: [main]
    paths:
      - 'book/**'
      - 'book-zhtw/**'
      - 'book-en/**'
      - 'book-ru/**'
      - 'book-ta/**'
      - 'book-vi/**'
      - 'book-ja/**'
      - 'build_epub.sh'
      - 'epub.css'
      - 'flatten_epub_toc.py'
      - '.github/workflows/build-latest.yml'
      - '.github/scripts/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-latest
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install build tools
        run: |
          brew install pandoc poppler librsvg
          brew install --cask mactex-no-gui font-dejavu font-noto-sans-cjk-sc font-noto-sans-cjk-tc font-noto-serif-tamil
          echo "/Library/TeX/texbin" >> "$GITHUB_PATH"

      # PingFang is an on-demand font since macOS Sequoia and is absent on fresh
      # runners (only an unusable reserved UI copy exists); without it
      # rsvg-convert renders Chinese figure text in a fallback font (Japanese
      # glyph variants). Fetch the real font from Apple's asset CDN and index it
      # for fontconfig.
      - name: Install PingFang fonts
        run: |
          bash .github/scripts/install_apple_fonts.sh
          fc-cache -f

      # PANGOCAIRO_BACKEND=fontconfig: pango's CoreText backend on the runners
      # cannot use the freshly installed user font and silently substitutes
      # another CJK font in SVG figures; the fontconfig backend picks it up.

      # WIP: Japanese fonts for the (still unvalidated) ja PDF build. Non-fatal so
      # a bad cask name can never break the release build for the other languages.
      - name: Install Japanese fonts (WIP)
        continue-on-error: true
        run: |
          brew install --cask font-noto-sans-cjk-jp || true
          brew install --cask font-noto-serif-cjk-jp || brew install --cask font-noto-serif-cjk || true

      # Each language is built in its own background job so the ~8 XeLaTeX
      # passes run concurrently instead of back-to-back. Output is captured per
      # language and printed after all jobs finish (interleaved live logs would
      # be unreadable). The ja build (WIP) runs in the same batch but is
      # non-fatal — only a main-language failure fails the step.
      # macOS runners ship bash 3.2, so no associative arrays: pid↔dir pairing
      # is carried in a "pid:dir" string list.
      - name: Build PDFs
        env:
          PANGOCAIRO_BACKEND: fontconfig
        run: |
          set -u
          main="book book-zhtw book-en book-ru book-vi book-ta"
          pids=""
          for dir in $main book-ja; do
            ( cd "$dir" && bash build_pdf.sh ) > "build_${dir}.log" 2>&1 &
            pids="$pids $!:$dir"
          done
          fail=0
          for pd in $pids; do
            pid="${pd%%:*}"; dir="${pd##*:}"
            if wait "$pid"; then
              echo "OK: $dir"
            elif [ "$dir" = "book-ja" ]; then
              echo "::warning::Japanese PDF build failed (WIP, non-fatal)"
            else
              echo "::error::PDF build failed for $dir"
              fail=1
            fi
          done
          for dir in $main book-ja; do
            echo "===================== $dir ====================="
            cat "build_${dir}.log" 2>/dev/null || true
          done
          exit $fail

      - name: Verify Chinese figure fonts
        run: |
          python3 .github/scripts/verify_pdf_fonts.py \
            "book/深入理解-AI-Agent-李博杰-v1.3.pdf" \
            "book-zhtw/深入理解-AI-Agent-李博杰-v1.3-zhtw.pdf"

      - name: Build EPUBs
        run: ./build_epub.sh all

      # WIP: ja EPUB depends on the ja PDF above; non-fatal, not part of `all`.
      - name: Build Japanese EPUB (WIP, non-fatal)
        continue-on-error: true
        run: ./build_epub.sh ja

      - name: Upload to the rolling latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          out="$(mktemp -d)"
          cp "book/深入理解-AI-Agent-李博杰-v1.3.pdf"              "$out/AI-Agents-in-Depth-zh-CN.pdf"
          cp "book-zhtw/深入理解-AI-Agent-李博杰-v1.3-zhtw.pdf"   "$out/AI-Agents-in-Depth-zh-TW.pdf"
          cp book-en/AI-Agents-in-Depth-Bojie-Li-v1.3.pdf        "$out/AI-Agents-in-Depth-en.pdf"
          cp book-ru/AI-Agents-in-Depth-ru.pdf                   "$out/AI-Agents-in-Depth-ru.pdf"
          cp book-ta/AI-Agents-in-Depth-Bojie-Li-v1.3-ta.pdf     "$out/AI-Agents-in-Depth-ta.pdf"
          cp book-vi/AI-Agents-in-Depth-Bojie-Li-v1.3-vi.pdf     "$out/AI-Agents-in-Depth-vi.pdf"
          cp "book/深入理解-AI-Agent-李博杰-v1.3.epub"             "$out/AI-Agents-in-Depth-zh-CN.epub"
          cp "book-zhtw/深入理解-AI-Agent-李博杰-v1.3-zhtw.epub"   "$out/AI-Agents-in-Depth-zh-TW.epub"
          cp book-en/AI-Agents-in-Depth-Bojie-Li-v1.3.epub       "$out/AI-Agents-in-Depth-en.epub"
          cp book-ru/AI-Agents-in-Depth-ru.epub                  "$out/AI-Agents-in-Depth-ru.epub"
          cp book-ta/AI-Agents-in-Depth-Bojie-Li-v1.3-ta.epub    "$out/AI-Agents-in-Depth-ta.epub"
          cp book-vi/AI-Agents-in-Depth-Bojie-Li-v1.3-vi.epub    "$out/AI-Agents-in-Depth-vi.epub"
          # WIP: ja artifacts are copied only if the (non-fatal) ja build produced them.
          cp book-ja/AI-Agents-in-Depth-Bojie-Li-v1.3-ja.pdf     "$out/AI-Agents-in-Depth-ja.pdf"  || echo "ja PDF not built yet (WIP) — skipping"
          cp book-ja/AI-Agents-in-Depth-Bojie-Li-v1.3-ja.epub    "$out/AI-Agents-in-Depth-ja.epub" || echo "ja EPUB not built yet (WIP) — skipping"
          gh release upload latest "$out"/* --clobber --repo "${{ github.repository }}"
