<text x="637.5" y="448" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#666666" text-anchor="middle" dominant-baseline="central" font-weight="normal">thumbnail.py etc.</text>
<rect x="100" y="490" width="620" height="35" rx="4" fill="#f5f5f5" stroke="#999999" stroke-width="2"/>
<text x="410" y="508" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15.5" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="normal">Fixed metadata → KV Cache friendly | Dynamic content appended → Cache not broken</text>
